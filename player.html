<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Đang xem - Lumina Play</title>
    <script src="hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="player.css">
</head>

<body style="background: #000">
    <header id="filterBar">
        <div class="header-main">
            <a href="index.html" class="logo">
                LUMINA
                <div class="logo-play-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M19.467 11.315L7.867 4.228a1.2 1.2 0 00-1.867 1.012v13.518a1.2 1.2 0 001.867 1.012l11.6-7.087a1.206 1.206 0 000-2.368z" />
                    </svg>
                </div>
            </a>


            <div class="user-container" id="userContainer">
                <button class="user-btn" id="userBtn" title="Tài khoản">
                    <img id="headerAvatar"
                        style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    <i class="fa-solid fa-circle-user" id="userIcon"></i>
                </button>
                <div class="user-dropdown" id="userDropdown">
                    <div id="loginSection">
                        <button class="login-btn-github" id="githubLogin">
                            <i class="fa-brands fa-github"></i> Đăng nhập với GitHub
                        </button>
                    </div>
                    <div id="accountSection" style="display: none;">
                        <div class="user-info-brief">
                            <img id="dropdownAvatar" src="" alt="Avatar">
                            <div class="user-details">
                                <div id="dropdownName">Tên người dùng</div>
                                <div id="dropdownLogin">@username</div>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <button class="logout-btn" id="logoutBtn">
                            <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                        </button>
                    </div>
                </div>
            </div>

            <div class="search-box">
                <button class="filter-toggle-btn" id="filterToggle" title="Bộ lọc phim">
                    <i class="fa-solid fa-sliders"></i>
                </button>
                <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">

                <!-- Popup Bộ Lọc -->
                <div class="filter-popup-backdrop" id="filterPopupBackdrop"></div>
                <div class="filter-popup" id="filterPopup">
                    <div class="filter-grid">
                        <div class="custom-select" id="selectList">
                            <div class="select-trigger"><span>Danh sách</span><i class="fa-solid fa-chevron-down"></i>
                            </div>
                            <div class="options-container"></div>
                        </div>
                        <div class="custom-select" id="selectCategory">
                            <div class="select-trigger"><span>Thể loại</span><i class="fa-solid fa-chevron-down"></i>
                            </div>
                            <div class="options-container"></div>
                        </div>
                        <div class="custom-select" id="selectCountry">
                            <div class="select-trigger"><span>Quốc gia</span><i class="fa-solid fa-chevron-down"></i>
                            </div>
                            <div class="options-container"></div>
                        </div>
                        <div class="custom-select" id="selectYear">
                            <div class="select-trigger"><span>Năm</span><i class="fa-solid fa-chevron-down"></i></div>
                            <div class="options-container"></div>
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button class="btn-reset" id="btnReset"><i class="fa-solid fa-rotate-left"></i> Đặt lại</button>
                        <button class="btn-apply" id="btnApply">Áp dụng</button>
                    </div>
                </div>
            </div>
        </div>

    </header>

    <div class="player-container">
        <div id="loader" class="loader active" style="position: absolute; z-index: 10;">
            <div class="spinner"></div>
        </div>
        <video id="video" controls playsinline webkit-playsinline autopictureinpicture autoplay crossorigin="anonymous"></video>
    </div>

    <div class="movie-info-hero">
        <h1 id="current-title">Đang tải...</h1>

        <div class="movie-meta-row" id="current-meta" style="display: none;">
            <span class="meta-item year" id="meta-year"></span>
            <span class="meta-item lang" id="meta-lang"></span>
        </div>

        <p id="current-desc"></p>

        <div id="keywords-container" class="tags-container"></div>

        <div id="episodes-section" style="margin-top: 1.5rem; display: none;">
            <div class="section-header">
                <h2>Danh sách tập phim</h2>
            </div>
            <div id="episodes" class="episodes-container"></div>
        </div>

        <div id="castSection" class="related-section" style="margin-top: 1.5rem; display: none;">
            <div class="section-header">
                <h2>Diễn viên & Đạo diễn</h2>
            </div>
            <div id="castList" class="cast-grid"></div>
        </div>

        <div class="related-section" id="relatedSection" style="margin-top: 1.5rem; display: none;">
            <div class="section-header">
                <h2>Phim Liên Quan</h2>
            </div>
            <div class="movie-grid" id="relatedGrid"></div>
        </div>
    </div>

    <script src="player.js"></script>
</body>

</html>
